name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# CI verifies that every push/PR builds. Release APKs are built and signed
# locally by the maintainer and attached to GitHub Releases, the signing
# key never leaves the maintainer's machine.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chitrashala-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
